name: Extract WordPress Hooks

on:
  push:
    branches: [ main, master ]
    paths: [ '**.php' ]
  workflow_dispatch:

jobs:
  extract-hooks:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push to wiki repository
    steps:
    - uses: actions/checkout@v4
    - uses: akirk/extract-wp-hooks@main
      with:
        base-dir: "."
        exclude-dirs: "vendor,tests,node_modules,updates"
        ignore-filters: "debug_hook,internal_filter"
        section: "file"
        wiki-repo: "joedolson/wp-accessibility.wiki.git"